<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fadiltzy Proxy</title>
  <style>
    body {
      background-color: #0f172a;
      font-family: Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    input[type="text"] {
      padding: 12px;
      width: 80%;
      max-width: 400px;
      border: none;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #38bdf8;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0ea5e9;
    }

    footer {
      position: absolute;
      bottom: 15px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Fadiltzy</h1>
  <p>Masukkan URL yang ingin kamu akses secara bebas</p>

  <form onsubmit="goToURL(); return false;">
    <input type="text" id="urlInput" placeholder="Contoh: https://example.com" required />
    <br>
    <button type="submit">Go</button>
  </form>

  <footer>&copy; 2025 Fadiltzy Proxy. Untuk belajar dan eksplorasi.</footer>

  <script>
    function goToURL() {
      let url = document.getElementById('urlInput').value;
      if (!url.startsWith('http')) {
        url = 'https://' + url;
      }
      window.open(url, '_blank');
    }
  </script>

</body>
</html>
